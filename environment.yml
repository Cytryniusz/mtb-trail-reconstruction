name: mtb-trail
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  # Geo - PDAL musi byc z conda-forge (binarka + binding)
  - pdal>=2.6
  - python-pdal>=3.2
  - gdal>=3.7
  - geos
  - proj
  # Pelny stack przez conda dla deterministycznego rozwiazania
  - numpy>=1.24
  - scipy>=1.11
  - matplotlib>=3.7
  - geopandas>=0.14
  - shapely>=2.0
  - rasterio>=1.3
  - pillow>=10.0
  - laspy>=2.5
  - lazrs-python>=0.5
  - gpxpy>=1.6
  - pyyaml>=6.0
  # Open3D na pip — niedostepne w conda-forge na wszystkich platformach
  - pip
  - pip:
      - open3d>=0.18
