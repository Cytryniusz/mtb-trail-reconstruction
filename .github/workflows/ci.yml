name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Anuluj poprzednie biegi tej samej galezi (oszczedza minuty GHA)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-syntax:
    name: Ruff + py_compile
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check (lint + import sorting)
        run: ruff check src/ scripts/

      - name: Syntax check (py_compile)
        run: python -m compileall -q src/ scripts/
